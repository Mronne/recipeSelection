# ==========================================
# 极空间 Z2 PRO 部署配置
# 架构: linux/amd64 + linux/arm64 多架构
# ==========================================

version: "3.8"

services:
  # 后端 API + 前端 Web 合一服务
  mealie:
    container_name: wangzhe-restaurant
    image: ghcr.io/mronne/recipeselection:main
    restart: always
    ports:
      - "9000:9000"
    volumes:
      # 数据持久化存储
      - ./data/mealie-data:/app/data/
    environment:
      # 用户权限
      - PUID=1000
      - PGID=1000
      # 时区
      - TZ=Asia/Shanghai
      # 允许注册
      - ALLOW_SIGNUP=true
      # 日志级别
      - LOG_LEVEL=info
      # 应用基础 URL（修改为你的极空间IP）
      - BASE_URL=http://192.168.1.100:9000
      # 数据库（SQLite 适合个人使用）
      - DB_ENGINE=sqlite
      # OpenAI 配置（可选，用于智能解析食谱）
      # - OPENAI_API_KEY=your-api-key
      # - OPENAI_MODEL=gpt-4o-mini

networks:
  mealie-network:
    driver: bridge
