services:
  # Mealie 后端服务
  mealie:
    container_name: wangzhe-restaurant-api
    image: ghcr.io/${GITHUB_USER:-mronne}/recipeselection:latest
    build:
      context: .
      target: production
      dockerfile: ./docker/Dockerfile
    restart: always
    volumes:
      - ${DATA_DIR:-./data}/mealie-data:/app/data/
      - ${DATA_DIR:-./data}/mealie-images:/app/images
    ports:
      - "9000:9000"
    environment:
      # 基础配置
      PUID: "${PUID:-1000}"
      PGID: "${PGID:-1000}"
      TZ: "${TZ:-Asia/Shanghai}"
      
      # 应用配置
      ALLOW_SIGNUP: "${ALLOW_SIGNUP:-true}"
      LOG_LEVEL: "${LOG_LEVEL:-info}"
      BASE_URL: "${BASE_URL:-http://localhost:9000}"
      
      # 数据库配置（默认 SQLite）
      DB_ENGINE: "${DB_ENGINE:-sqlite}"
      
      # Postgres 配置（可选）
      # POSTGRES_USER: mealie
      # POSTGRES_PASSWORD: mealie
      # POSTGRES_SERVER: postgres
      # POSTGRES_PORT: 5432
      # POSTGRES_DB: mealie
      
      # OpenAI 配置（可选，用于智能解析）
      # OPENAI_API_KEY: your-api-key
      # OPENAI_MODEL: gpt-4o-mini
      
      # 邮件配置（可选）
      # SMTP_HOST=
      # SMTP_PORT=587
      # SMTP_FROM_NAME=王者餐厅
      # SMTP_AUTH_STRATEGY=TLS
      # SMTP_FROM_EMAIL=
      # SMTP_USER=
      # SMTP_PASSWORD=
    networks:
      - mealie-network

  # Next.js 前端服务（可选，独立部署时使用）
  # 如果你希望前后端分离，取消下面的注释
  # frontend:
  #   container_name: wangzhe-restaurant-web
  #   image: ghcr.io/${GITHUB_USER:-mronne}/recipeselection-frontend:latest
  #   build:
  #     context: ./frontend
  #     dockerfile: Dockerfile
  #   restart: always
  #   ports:
  #     - "3000:3000"
  #   environment:
  #     # 后端 API 地址（使用 Docker 内部网络）
  #     - NEXT_PUBLIC_API_URL=http://mealie:9000
  #   networks:
  #     - mealie-network
  #   depends_on:
  #     - mealie

# 可选：使用 Postgres 数据库（推荐用于生产环境）
#   postgres:
#     container_name: mealie-postgres
#     image: postgres:15
#     restart: always
#     volumes:
#       - ${DATA_DIR:-./data}/postgres:/var/lib/postgresql/data
#     environment:
#       POSTGRES_USER: mealie
#       POSTGRES_PASSWORD: mealie
#       POSTGRES_DB: mealie
#     healthcheck:
#       test: ["CMD", "pg_isready", "-U", "mealie"]
#       interval: 10s
#       timeout: 5s
#       retries: 5
#     networks:
#       - mealie-network

networks:
  mealie-network:
    driver: bridge
