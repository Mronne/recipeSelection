name: Export Docker Images for Download (Multi-Arch)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  IMAGE_NAME: ghcr.io/mronne/recipeselection:main

jobs:
  export-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3
      with:
        platforms: linux/amd64,linux/arm64

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Pull and save ARM64 image
      run: |
        docker pull --platform linux/arm64 ${{ env.IMAGE_NAME }}
        docker save ${{ env.IMAGE_NAME }} > mealie-arm64.tar
        gzip -c mealie-arm64.tar > mealie-arm64.tar.gz
        echo "=== ARM64 镜像信息 ==="
        docker inspect ${{ env.IMAGE_NAME }} | grep -i arch | head -5
        ls -lh mealie-arm64.tar.gz

    - name: Upload ARM64 image artifact
      uses: actions/upload-artifact@v4
      with:
        name: mealie-image-arm64
        path: mealie-arm64.tar.gz
        retention-days: 30

  create-release-package:
    needs: [export-image]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Download artifact
      uses: actions/download-artifact@v4
      with:
        name: mealie-image-arm64
        path: ./artifacts

    - name: Create deployment package
      run: |
        mkdir -p deployment/mealie-images
        cp ./artifacts/mealie-arm64.tar.gz deployment/mealie-images/
        cp docker-compose.zspace.yml deployment/
        cp DEPLOY_ZSPACE_Z2PRO.md deployment/
        cp IMPORT_IMAGES_MANUAL.md deployment/
        
        cat > deployment/load-images.sh << 'EOF'
        #!/bin/bash
        echo "=== 导入 Mealie 镜像到极空间 (ARM64) ==="
        echo ""
        echo "当前架构: $(uname -m)"
        echo ""
        echo "导入单镜像..."
        gunzip -c mealie-images/mealie-arm64.tar.gz | docker load
        echo ""
        echo "=== 导入完成 ==="
        echo "查看镜像:"
        docker images | grep recipeselection
        EOF
        
        chmod +x deployment/load-images.sh
        
        cd deployment
        zip -r ../mealie-deployment-package.zip .
        cd ..
        
        echo "=== 部署包内容 ==="
        unzip -l mealie-deployment-package.zip
        ls -lh mealie-deployment-package.zip

    - name: Upload deployment package
      uses: actions/upload-artifact@v4
      with:
        name: mealie-deployment-package-arm64
        path: mealie-deployment-package.zip
        retention-days: 30
