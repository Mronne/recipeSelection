name: Build and Push to Docker Hub (Multi-Arch)

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  workflow_dispatch:

env:
  IMAGE_NAME: mronne/wangzhe-restaurant

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3
      with:
        platforms: linux/amd64,linux/arm64

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=sha
          latest

    - name: Build and push multi-arch image
      id: build-and-push
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./docker/Dockerfile
        target: production
        platforms: linux/amd64,linux/arm64
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Output image info
      run: |
        echo "Multi-arch image pushed:"
        echo "  ${{ env.IMAGE_NAME }}:latest"
        echo "  ${{ env.IMAGE_NAME }}:${{ github.sha }}"
        echo ""
        echo "Supported platforms: linux/amd64, linux/arm64"

  create-deployment-guide:
    needs: [build-and-push]
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - name: Create deployment files
      run: |
        mkdir -p deployment
        
        cat > deployment/docker-compose.yml << 'EOF'
        # ==========================================
        # 极空间 Z2 PRO 部署配置 (Docker Hub 版本)
        # 架构: linux/amd64 + linux/arm64 多架构
        # ==========================================
        
        version: "3.8"
        
        services:
          mealie:
            container_name: wangzhe-restaurant
            image: mronne/wangzhe-restaurant:latest
            restart: always
            ports:
              - "9000:9000"
            volumes:
              - ./data/mealie-data:/app/data/
            environment:
              - PUID=1000
              - PGID=1000
              - TZ=Asia/Shanghai
              - ALLOW_SIGNUP=true
              - BASE_URL=http://你的极空间IP:9000
        EOF
        
        cat > deployment/README.txt << 'EOF'
        王者餐厅 - 极空间 Z2 PRO 部署包 (Docker Hub 版本)
        ================================================
        
        镜像地址:
          - 单镜像: docker.io/mronne/wangzhe-restaurant:latest
          
        说明:
          这是一个后端+前端合一的单镜像，FastAPI 直接托管 Next.js 静态页面。
          无需单独部署前端容器。
        
        部署步骤:
          1. 将 docker-compose.yml 上传到极空间
          2. 修改文件中的 "你的极空间IP" 为实际 IP
          3. 在 Container Station 中使用 Compose 项目部署
        
        访问地址:
          - http://极空间IP:9000
        EOF
        
        cd deployment
        zip -r ../zspace-dockerhub-deployment.zip .
        cd ..
    
    - name: Upload deployment package
      uses: actions/upload-artifact@v4
      with:
        name: zspace-dockerhub-deployment
        path: zspace-dockerhub-deployment.zip
        retention-days: 30

  export-arm64:
    needs: [build-and-push]
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3
      with:
        platforms: linux/arm64

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Pull and export ARM64 image
      run: |
        docker pull --platform linux/arm64 ${{ env.IMAGE_NAME }}:latest
        docker tag ${{ env.IMAGE_NAME }}:latest ${{ env.IMAGE_NAME }}:arm64-export
        docker save ${{ env.IMAGE_NAME }}:arm64-export | gzip > mealie-arm64.tar.gz
        ls -lh mealie-arm64.tar.gz

    - name: Upload ARM64 image artifact
      uses: actions/upload-artifact@v4
      with:
        name: mealie-arm64-image
        path: mealie-arm64.tar.gz
        retention-days: 30
